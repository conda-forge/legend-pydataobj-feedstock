schema_version: 1

context:
  name: legend-pydataobj
  version: "2.0.2"
  python_min: '3.10'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/legend_pydataobj-${{ version }}.tar.gz
  sha256: 6fc9ce7a919f65635db9edcbbae433da02e5ac7b958bacad2ca2a596046b2040

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=77
    - setuptools-scm >=7
  run:
    - python >=${{ python_min }}
    - awkward >=2
    - awkward-pandas
    - colorlog
    - hist
    - numba !=0.53,!=0.54.*
    - numexpr
    - numpy >=1.21
    - pandas >=1.4.4
    - parse
    - pint >0.24
    - pint-pandas
    - pyarrow
tests:
  - python:
      imports:
        - lgdo
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pip
    script:
      - pip list

about:
  license: GPL-3.0-only
  license_file: LICENSE
  summary: LEGEND Python Data Objects
  description: |
    This package provides a Python implementation of the LEGEND Data Objects
    (LGDO).  More documentation is available in the [LEGEND data format
    specification](https://legend-exp.github.io/legend-data-format-specs).
  homepage: https://github.com/legend-exp/legend-pydataobj
  repository: https://github.com/legend-exp/legend-pydataobj
  documentation: https://legend-pydataobj.readthedocs.io/

extra:
  recipe-maintainers:
    - gipert
    - matthewfeickert
